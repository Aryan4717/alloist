name: Perf Sanity

on:
  push:
    branches: [feature/scale-testing, main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  perf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create .env for CI
        run: |
          cat > .env << 'EOF'
          TOKEN_SERVICE_API_KEY=dev-api-key
          POLICY_SERVICE_API_KEY=dev-api-key
          JWT_SECRET=ci-secret-for-testing
          EOF

      - name: Start services
        run: |
          cd backend/token_service
          docker compose up -d
          echo "Waiting for services..."
          sleep 15

      - name: Wait for token service
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/keys > /dev/null; then
              echo "Token service ready"
              exit 0
            fi
            sleep 2
          done
          echo "Token service failed to start"
          exit 1

      - name: Create signing key
        run: |
          cd backend/token_service
          docker compose run --rm -T --entrypoint "" token_service sh -c "alembic upgrade head && python -m app.cli.rotate_key"

      - name: Verify mint works
        run: |
          curl -sf -X POST http://localhost:8000/tokens \
            -H "Content-Type: application/json" \
            -H "X-API-Key: dev-api-key" \
            -d '{"subject":"smoke","scopes":["read"],"ttl_seconds":60}' \
            | grep -q token_id && echo "Mint OK" || (echo "Mint failed"; exit 1)

      - name: Install benchmark deps
        run: |
          pip install -r benchmarks/requirements.txt
          pip install -e packages/enforcement_py

      - name: Verify token service before benchmarks
        run: |
          curl -sf http://localhost:8000/keys > /dev/null || (echo "Token service down before benchmarks"; cd backend/token_service && docker compose ps -a; exit 1)

      - name: Run revoke latency benchmark
        run: |
          cd benchmarks
          python revoke_latency.py --host http://localhost:8000 --clients 20 --connect-wait 5 --api-key dev-api-key --output revoke_result.json || true
          cat revoke_result.json 2>/dev/null || echo '{"error":"no output"}'

      - name: Run agent throughput benchmark
        run: |
          cd benchmarks
          python agent_throughput.py --host http://localhost:8000 --workers 20 --duration 5 --api-key dev-api-key --output agent_result.json || true
          cat agent_result.json 2>/dev/null || echo '{"error":"no output"}'

      - name: Assert thresholds and output metrics
        run: |
          cd benchmarks
          python3 << 'PYEOF'
          import json
          import os
          import sys

          def load_json(path, default):
              try:
                  with open(path) as f:
                      return json.load(f)
              except (json.JSONDecodeError, FileNotFoundError):
                  pass
              return default

          revoke = load_json("revoke_result.json", {"p95_ms": None, "error": "parse_failed"})
          agent = load_json("agent_result.json", {"throughput_checks_per_sec": None, "error": "parse_failed"})

          p95 = revoke.get("p95_ms")
          throughput = agent.get("throughput_checks_per_sec")
          if p95 is None:
              p95 = 9999
          if throughput is None:
              throughput = 0

          summary = f"""## Perf Results

          | Metric | Value | Threshold |
          |--------|-------|-----------|
          | Revoke p95 (ms) | {p95} | < 10000 |
          | Throughput (checks/s) | {throughput} | > 1 |
          """
          step_summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if step_summary:
              with open(step_summary, "a") as f:
                  f.write(summary)

          # CI thresholds (relaxed for shared runners; local runs can use stricter)
          fail = False
          if p95 >= 10000:
              print(f"FAIL: Revoke p95 {p95}ms >= 10000ms", file=sys.stderr)
              fail = True
          if throughput < 1:
              print(f"FAIL: Throughput {throughput} < 1 checks/s", file=sys.stderr)
              fail = True

          with open("perf_results.json", "w") as f:
              json.dump({"revoke": revoke, "agent": agent}, f, indent=2)

          sys.exit(1 if fail else 0)
          PYEOF

      - name: Prepare perf results for upload
        if: always()
        run: |
          mkdir -p benchmarks
          [ -f benchmarks/perf_results.json ] || echo '{"revoke":{"error":"assert_never_ran"},"agent":{"error":"assert_never_ran"}}' > benchmarks/perf_results.json

      - name: Upload perf results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results
          path: benchmarks/perf_results.json

      - name: Debug on failure
        if: failure()
        run: |
          cd backend/token_service
          docker compose ps -a
          docker compose logs token_service --tail 50

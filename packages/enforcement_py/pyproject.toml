[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "cognara-enforce"
version = "0.1.0"
description = "Python SDK for token+policy enforcement with offline caching and revocation listener"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "pyjwt[crypto]>=2.8",
    "cryptography>=42.0",
    "httpx>=0.26",
    "websocket-client>=1.6",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["cognara_enforce*"]

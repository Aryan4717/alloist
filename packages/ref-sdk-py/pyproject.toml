[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "alloist-ref-sdk-py"
version = "0.1.0"
description = "Minimal ACT-lite reference SDK: token, evidence, revocation verification"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
    "pyjwt[crypto]>=2.8",
    "cryptography>=42.0",
    "httpx>=0.26",
]

[project.optional-dependencies]
dev = ["pytest>=7.4"]

[tool.setuptools.packages.find]
where = ["."]
include = ["alloist_ref_sdk*"]
